name: mainyuk-stack

services:
  mysql:
    container_name: mainyuk-mysql
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    container_name: mainyuk-backend
    build:
      context: ./back-end
      dockerfile: dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - ./.env
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-5000}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      UPLOADS_DIR: ${UPLOADS_DIR:-/app/uploads}
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM: ${RESEND_FROM}
    volumes:
      - ./dev-storage/uploads:/app/uploads

  frontend:
    container_name: mainyuk-frontend
    build:
      context: ./front-end
      dockerfile: dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:5000/api}
    restart: always
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql-data: